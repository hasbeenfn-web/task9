<!DOCTYPE html>
<html>
<head>
    <title>Function Example</title>
</head>
<body>

    <h2>Greeting App</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <button id="btn">Greet</button>

    <script>

        // Step 1: Function
        function greet(studName) {
            // Step 2: Return greeting message
            return "Hello " + studName;
        }

        // Step 3: Call function on button click
        document.getElementById("btn").addEventListener("click", function() {

            let studName = document.getElementById("name").value;

            let message = greet(studName);

            console.log(message);
        });

    </script>

</body>
</html>
